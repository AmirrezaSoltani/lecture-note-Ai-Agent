version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lecture-note-builder:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      APP_HOST: 0.0.0.0
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: auto
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - lecture_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  rq-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: lecture-note-builder:latest
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: rq
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - lecture_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m app.db && rq worker ${RQ_QUEUE_NAME:-lecture-processing} --url ${REDIS_URL:-redis://redis:6379/0}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  lecture_data:
  redis_data:
